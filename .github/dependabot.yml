---
# https://docs.github.com/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Adopted from qte77/repo-baseline L2-ci-files/dependabot/uv.yml. uv.lock is now
# present, so the uv ecosystem is active alongside github-actions.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns: ["*"]
