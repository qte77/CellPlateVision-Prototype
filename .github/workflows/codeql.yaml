---
# https://github.blog/changelog/2025-10-28-upcoming-deprecation-of-codeql-action-v3/
#
# Adopted from qte77/repo-baseline L2-ci-files/codeql.yaml (issue #9).
# Action refs are SHA-pinned per the baseline org rule (sha_pin_required: true).
#
# `push:` (no branch filter) is deliberate: under `pull_request:`, codeql-action
# uploads SARIFs against a synthetic merge-ref SHA that GitHub recomputes on every
# push or main-move, racing the merge-protection check. `push:` uploads against the
# real commit SHA, eliminating that race.
#
# DOCS-ONLY DEVIATION FROM BASELINE: while this repo has no Python source, the
# `paths:` filter and disabled `schedule:` keep the workflow dormant (CodeQL's
# python analysis fails with "no source seen" on zero .py files). When the first
# Python source lands, restore baseline behaviour: delete the `paths:` filter and
# uncomment the weekly `schedule:`.
name: "CodeQL"

on:
  push:
    paths:
      - '**/*.py'
      - '.github/workflows/codeql.yaml'
  workflow_dispatch:
  # Re-enable to match baseline once Python source is scaffolded:
  # schedule:
  #   - cron: '27 11 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
      with:
        languages: ${{ vars.CODEQL_LANGUAGES || 'python' }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4

    - name: Perform CodeQL Analysis
      id: analyze
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
      with:
        output: sarif-results

    - name: Dismiss alerts with inline suppression comments
      uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e  # v2.0.2
      with:
        sarif-id: ${{ steps.analyze.outputs.sarif-id }}
        sarif-file: sarif-results
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
